<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Cadastro de Solicitações</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Cadastro de Solicitações</h1>

    <form id="formularioCadastro">

        <label>Nome do Solicitante</label>
        <select id="solicitantesFiltro">
            <option value="">Solicitantes</option>
        </select>

        <label>Categoria</label>
        <select id="categoriasFiltro">
            <option value="">Categorias</option>
        </select>

        <label>Status</label>
        <select id="statusFiltro">
            <option value="">Status</option>
        </select>

        <label>Descrição</label>
        <input type="text" id="descricao">

        <label>Valor</label>
        <input type="number" id="valor">

        <label>Data</label>
        <input type="date" id="data">

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <button onclick="voltarPagina()">
        Voltar
    </button>

    <script src="js/apiSGS.js"></script>
    <script src="js/cadastro.js"></script>

</body>
</html>
